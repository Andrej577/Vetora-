services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vetora-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: vet_ambulanta
      DB_USERNAME: vet_user
      DB_PASSWORD: promijeni_ovo
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy
      - vetora-internal

  db:
    image: mysql:8.4
    container_name: vetora-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vet_ambulanta
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: promijeni_ovo
      MYSQL_ROOT_PASSWORD: promijeni_root
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppromijeni_root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vetora-internal

volumes:
  db_data:

networks:
  proxy:
    external: true
  vetora-internal: